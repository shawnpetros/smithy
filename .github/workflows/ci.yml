name: ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  elixir-daemon:
    name: elixir-daemon (format + test)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up mise tools
        uses: jdx/mise-action@5228313ee0372e111a38da051671ca30fc5a96db # v3
        with:
          install: true
          cache: true
          working_directory: elixir

      - name: Cache deps and build
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            elixir/deps
            elixir/_build
          key: ${{ runner.os }}-elixir-mix-${{ hashFiles('elixir/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-elixir-mix-

      - name: deps.get
        working-directory: elixir
        run: mix deps.get

      - name: format check
        working-directory: elixir
        run: mix format --check-formatted

      - name: test
        working-directory: elixir
        run: mix test

  wrapper:
    name: wrapper (format + test)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up mise tools
        uses: jdx/mise-action@5228313ee0372e111a38da051671ca30fc5a96db # v3
        with:
          install: true
          cache: true
          working_directory: wrapper

      - name: Cache deps and build
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            wrapper/deps
            wrapper/_build
          key: ${{ runner.os }}-wrapper-mix-${{ hashFiles('wrapper/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-wrapper-mix-

      - name: deps.get
        working-directory: wrapper
        run: mix deps.get

      - name: format check
        working-directory: wrapper
        run: mix format --check-formatted

      - name: test
        working-directory: wrapper
        run: mix test

  build-escripts:
    name: build escripts + upload artifacts
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [elixir-daemon, wrapper]

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up mise tools (elixir)
        uses: jdx/mise-action@5228313ee0372e111a38da051671ca30fc5a96db # v3
        with:
          install: true
          cache: true
          working_directory: elixir

      - name: Cache elixir deps and build
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            elixir/deps
            elixir/_build
          key: ${{ runner.os }}-elixir-mix-${{ hashFiles('elixir/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-elixir-mix-

      - name: Cache wrapper deps and build
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            wrapper/deps
            wrapper/_build
          key: ${{ runner.os }}-wrapper-mix-${{ hashFiles('wrapper/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-wrapper-mix-

      - name: deps.get (elixir)
        working-directory: elixir
        run: mix deps.get

      - name: build symphony escript
        working-directory: elixir
        run: mix escript.build

      - name: deps.get (wrapper)
        working-directory: wrapper
        run: mix deps.get

      - name: build smithy escript
        working-directory: wrapper
        run: mix escript.build

      - name: Upload escripts
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4
        with:
          name: escripts-${{ github.sha }}
          path: |
            elixir/bin/symphony
            wrapper/bin/smithy
          if-no-files-found: error
          retention-days: 30
